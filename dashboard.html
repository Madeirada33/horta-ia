<!-- TESTE -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horta Inteligente</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #13de21;
      --verde-escuro: #1a7a43;
      --amarelo: #F1C40F;
      --vermelho: #E74C3C;
      --fundo: #0a0f0a;
      --fundo2: #111811;
      --card: #141f14;
      --borda: #1e2e1e;
      --texto: #e8f5e8;
      --texto2: #7a9a7a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--fundo);
      color: var(--texto);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Fundo animado */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(46,204,113,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(46,204,113,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

 .logo {
  display: flex;
  align-items: center;
  gap: 18px;
}

.logo-icon {
  width: 90px;
height: 90px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 18px;

  background:
    linear-gradient(
      145deg,
      rgba(46,204,113,0.10),
      rgba(46,204,113,0.03)
    );

  border: 1px solid rgba(46,204,113,0.15);

  box-shadow:
    0 0 30px rgba(46,204,113,0.12),
    inset 0 0 20px rgba(46,204,113,0.04);

  backdrop-filter: blur(10px);
}

.logo-icon img {
  width: 120%;
  height: 120%;
  object-fit: contain;

  filter:
    brightness(0)
    invert(1)
    drop-shadow(0 0 14px rgba(46,204,113,0.45));
}
    .logo-text h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--texto);
      letter-spacing: -0.5px;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--texto2);
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--borda);
      padding: 8px 16px;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--texto2);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--verde);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(46,204,113,0); }
    }

    /* Cards principais */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeIn 0.6s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(46,204,113,0.3);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--verde), transparent);
      opacity: 0.4;
    }

    .card-label {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--texto2);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-value {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .card-unit {
      font-size: 18px;
      font-weight: 400;
      color: var(--texto2);
    }

    .card-sub {
      font-size: 13px;
      color: var(--texto2);
      font-family: 'Space Mono', monospace;
    }

    /* Barra de saúde */
    .saude-bar {
      width: 100%;
      height: 6px;
      background: var(--borda);
      border-radius: 100px;
      margin-top: 16px;
      overflow: hidden;
    }

    .saude-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 1s ease;
    }

    /* Card de planta */
    .card-planta .card-value {
      font-size: 32px;
      text-transform: capitalize;
    }

    /* Recomendações */
    .recomendacoes-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
      animation: fadeIn 0.8s ease both;
    }

    .recomendacoes-title {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--texto2);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .rec-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .rec-item {
      background: rgba(46,204,113,0.08);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--verde);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rec-item.alerta {
      background: rgba(231,76,60,0.08);
      border-color: rgba(231,76,60,0.2);
      color: var(--vermelho);
    }

    .rec-item.aviso {
      background: rgba(241,196,15,0.08);
      border-color: rgba(241,196,15,0.2);
      color: var(--amarelo);
    }

    /* Histórico */
    .historico-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 16px;
      padding: 28px;
      animation: fadeIn 1s ease both;
    }

    .historico-title {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--texto2);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .historico-table {
      width: 100%;
      border-collapse: collapse;
    }

    .historico-table th {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--texto2);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--borda);
    }

    .historico-table td {
      padding: 12px 12px;
      font-size: 13px;
      border-bottom: 1px solid rgba(30,46,30,0.5);
      font-family: 'Space Mono', monospace;
    }

    .historico-table tr:last-child td { border-bottom: none; }

    .historico-table tr:hover td {
      background: rgba(46,204,113,0.03);
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-verde { background: rgba(46,204,113,0.15); color: var(--verde); }
    .badge-amarelo { background: rgba(241,196,15,0.15); color: var(--amarelo); }
    .badge-vermelho { background: rgba(231,76,60,0.15); color: var(--vermelho); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--texto2);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--borda);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--texto2);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    .update-time {
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--texto2);
    }

    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
      .card-value { font-size: 36px; }
      header { flex-direction: column; align-items: flex-start; }
      .historico-table { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">
  <img src="/static/logo.svg" alt="Logo Coop-Habitat">
</div>
        <div class="logo-text">
          <h1>COOP-Habitat</h1>
          <p>Monitor em tempo real</p>
        </div>
      </div>
      <div class="status-bar">
        <div class="status-dot"></div>
        <span id="ultima-atualizacao">Conectando...</span>
      </div>
    </header>

    <div id="conteudo">
      <div class="loading">Carregando dados</div>
    </div>
  </div>

  <script>
    // URL da API — troca pela URL do Railway
    const API_URL = window.location.origin;

    function getSaudeColor(saude) {
      if (saude >= 70) return 'var(--verde)';
      if (saude >= 50) return 'var(--amarelo)';
      return 'var(--vermelho)';
    }

    function getSaudeBadge(saude) {
      if (saude >= 70) return 'badge-verde';
      if (saude >= 50) return 'badge-amarelo';
      return 'badge-vermelho';
    }

    function getRecClass(rec) {
      if (rec.includes('ideal')) return '';
      if (rec.includes('irrigar') || rec.includes('proteger')) return 'aviso';
      return 'alerta';
    }

    function formatData(iso) {
      const d = new Date(iso);
      return d.toLocaleString('pt-BR', { 
        day: '2-digit', month: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function carregarDados() {
      try {
        const [ultimoRes, historicoRes] = await Promise.all([
          fetch(`${API_URL}/ultimo-dado`),
          fetch(`${API_URL}/historico`)
        ]);

        const ultimo = await ultimoRes.json();
        const historico = await historicoRes.json();

        renderizar(ultimo, historico);

        document.getElementById('ultima-atualizacao').textContent = 
          'Atualizado ' + new Date().toLocaleTimeString('pt-BR');

      } catch (e) {
        document.getElementById('conteudo').innerHTML = 
          '<div class="empty">⚠️ Sem conexão com o servidor.<br>Verifique se a API está rodando.</div>';
      }
    }

    function renderizar(ultimo, historico) {
      const saudeColor = getSaudeColor(ultimo.saude || 0);
      
      const recsHtml = (ultimo.recomendacoes || ['Aguardando dados...']).map(r => 
        `<div class="rec-item ${getRecClass(r)}">
          <span>${r.includes('ideal') ? '✓' : '⚡'}</span> ${r}
        </div>`
      ).join('');

      const historicoHtml = historico.length === 0 
        ? '<tr><td colspan="5" style="text-align:center;color:var(--texto2);padding:24px">Nenhum dado registrado ainda</td></tr>'
        : [...historico].reverse().slice(0, 10).map(h => `
          <tr>
            <td style="text-transform:capitalize">${h.planta}</td>
            <td>${h.umidade}%</td>
            <td>${h.temperatura}°C</td>
            <td><span class="badge ${getSaudeBadge(h.saude)}">${h.saude}</span></td>
            <td style="color:var(--texto2)">${formatData(h.data)}</td>
          </tr>
        `).join('');

      document.getElementById('conteudo').innerHTML = `
        <div class="cards-grid">
          <div class="card card-planta" style="animation-delay:0s">
            <div class="card-label">🪴 Planta</div>
            <div class="card-value" style="color:var(--verde)">${ultimo.planta || '—'}</div>
            <div class="card-sub">Monitorada agora</div>
          </div>

          <div class="card" style="animation-delay:0.1s">
            <div class="card-label">💧 Umidade do Solo</div>
            <div class="card-value" style="color:#4FC3F7">
              ${ultimo.umidade !== undefined ? ultimo.umidade : '—'}
              <span class="card-unit">%</span>
            </div>
            <div class="saude-bar">
              <div class="saude-fill" style="width:${ultimo.umidade || 0}%;background:#4FC3F7"></div>
            </div>
          </div>

          <div class="card" style="animation-delay:0.2s">
            <div class="card-label">🌡️ Temperatura</div>
            <div class="card-value" style="color:#FF8A65">
              ${ultimo.temperatura !== undefined ? ultimo.temperatura : '—'}
              <span class="card-unit">°C</span>
            </div>
            <div class="card-sub">Ambiente</div>
          </div>

          <div class="card" style="animation-delay:0.3s">
            <div class="card-label">💚 Saúde da Planta</div>
            <div class="card-value" style="color:${saudeColor}">
              ${ultimo.saude !== undefined ? ultimo.saude : '—'}
              <span class="card-unit">/100</span>
            </div>
            <div class="saude-bar">
              <div class="saude-fill" style="width:${ultimo.saude || 0}%;background:${saudeColor}"></div>
            </div>
          </div>
        </div>

        <div class="recomendacoes-card">
          <div class="recomendacoes-title">⚡ Recomendações para o usario</div>
          <div class="rec-list">${recsHtml}</div>
        </div>

        <div class="historico-card">
          <div class="historico-title">
            <span>📋 Histórico de Leituras</span>
            <span class="update-time">Últimas 10 entradas</span>
          </div>
          <div style="overflow-x:auto">
            <table class="historico-table">
              <thead>
                <tr>
                  <th>Planta</th>
                  <th>Umidade</th>
                  <th>Temp.</th>
                  <th>Saúde</th>
                  <th>Data/Hora</th>
                </tr>
              </thead>
              <tbody>${historicoHtml}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    carregarDados();
    setInterval(carregarDados, 10000); // Atualiza a cada 10 segundos
  </script>
</body>
</html>

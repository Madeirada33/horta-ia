<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | COOP-Habitat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Nova paleta corporativa: Tons botânicos e tecnológicos balanceados */
      --verde: #10b981;        /* Emerald moderno */
      --verde-escuro: #065f46;
      --amarelo: #f59e0b;      /* Âmbar sofisticado */
      --vermelho: #ef4444;     /* Vermelho suave */
      --fundo: #090d10;        /* Slate escuro corporativo */
      --card: #111827;         /* Cinza escuro profundo */
      --borda: #1f2937;        /* Linhas de divisão discretas */
      --texto: #f3f4f6;        /* Branco fosco premium */
      --texto2: #9ca3af;       /* Cinza de apoio */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--fundo);
      color: var(--texto);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Brilho de fundo sutil (Glow tecnológico) */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px;
      position: relative;
      z-index: 1;
    }

    /* Header Profissional */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--borda);
      flex-wrap: wrap;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

      .logo-icon {
    width: 77px;       /* Aumenta o quadrado externo */
    height: 76px;      /* Aumenta o quadrado externo */
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.03); /* Fundo sutil para contrastar com o branco */
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
  }

  .logo-icon img {
    width: 130%;        /* Faz a logo ocupar quase todo o espaço disponível */
    height: 130%;
    object-fit: contain;

    /* Força qualquer cor original do SVG a virar branco puro com brilho suave */
    filter: brightness(0) invert(1) drop-shadow(0 0 12px rgba(255, 255, 255, 0.2));
  }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--texto);
      letter-spacing: -0.5px;
    }

    .logo-text p {
      font-size: 11px;
      color: var(--texto2);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(31, 41, 55, 0.5);
      border: 1px solid var(--borda);
      padding: 6px 14px;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--texto2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--verde);
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 0 5px rgba(16, 185, 129, 0); }
    }

    /* Grid de Cards Otimizada */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.5s ease both;
    }

    .card:hover {
      border-color: rgba(16, 185, 129, 0.25);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--texto2);
      letter-spacing: 1px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-value {
      font-size: 38px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--texto);
    }

    .card-unit {
      font-size: 16px;
      font-weight: 500;
      color: var(--texto2);
      margin-left: 2px;
    }

    .card-sub {
      font-size: 12px;
      color: var(--texto2);
      margin-top: 8px;
    }

    /* Barras de Progresso Slim */
    .saude-bar {
      width: 100%;
      height: 4px;
      background: rgba(31, 41, 55, 0.7);
      border-radius: 4px;
      margin-top: 16px;
      overflow: hidden;
    }

    .saude-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-planta .card-value {
      font-size: 26px;
      font-weight: 600;
      color: var(--texto) !important;
    }

    /* Recomendações Estilizadas */
    .recomendacoes-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      animation: fadeIn 0.6s ease both;
    }

    .recomendacoes-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--texto2);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .rec-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

     .rec-item {
    background: rgba(16, 185, 129, 0.06);
    border: 1px solid rgba(16, 185, 129, 0.15);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #34d399;
    display: flex;
    align-items: center;
    gap: 8px;
  }

    .rec-item.aviso {
    background: rgba(245, 158, 11, 0.06);
    border-color: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
  }

  .rec-item.tendencia {
    background: rgba(249, 115, 22, 0.06);
    border-color: rgba(249, 115, 22, 0.15);
    color: #fb923c;
  }

  .rec-item.alerta {
    background: rgba(239, 68, 68, 0.06);
    border-color: rgba(239, 68, 68, 0.15);
    color: #f87171;
  }
    /* Tabela de Histórico Corporativa */
    .historico-card {
      background: var(--card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 24px;
      animation: fadeIn 0.7s ease both;
    }

    .historico-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--texto2);
      letter-spacing: 1px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .historico-table {
      width: 100%;
      border-collapse: collapse;
    }

    .historico-table th {
      font-size: 11px;
      font-weight: 600;
      color: var(--texto2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--borda);
      background: rgba(31, 41, 55, 0.2);
    }

    .historico-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(31, 41, 55, 0.5);
      color: var(--texto);
    }

    .historico-table tr:last-child td { border-bottom: none; }

    .historico-table tr:hover td {
      background: rgba(255, 255, 255, 0.01);
    }

    /* Badges Minimalistas */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Space Mono', monospace;
    }

    .badge-verde { background: rgba(16, 185, 129, 0.1); color: #34d399; }
    .badge-amarelo { background: rgba(245, 158, 11, 0.1); color: #fbbf24; }
    .badge-vermelho { background: rgba(239, 68, 68, 0.1); color: #f87171; }

    /* Componentes Globais de Feedback */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--texto2);
      font-size: 13px;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--borda);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .empty {
      text-align: center;
      padding: 48px;
      color: var(--texto2);
      font-size: 13px;
      line-height: 1.6;
    }

    .update-time {
      font-size: 11px;
      color: var(--texto2);
      font-weight: 400;
      text-transform: none;
    }

    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: 1fr; }
      header { padding-bottom: 16px; margin-bottom: 24px; }
      .container { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">
          <img src="/static/logo.svg" alt="Logo Coop-Habitat">
        </div>
        <div class="logo-text">
          <h1>COOP-Habitat</h1>
          <p>Monitor de Cultivo</p>
        </div>
      </div>
      <div class="status-bar">
        <div class="status-dot"></div>
        <span id="ultima-atualizacao">Sincronizando...</span>
      </div>
    </header>

    <main id="conteudo">
      <div class="loading">Carregando telemetria</div>
    </main>
  </div>

  <script>
    const API_URL = window.location.origin;

    function getSaudeColor(saude) {
      if (saude >= 70) return 'var(--verde)';
      if (saude >= 50) return 'var(--amarelo)';
      return 'var(--vermelho)';
    }

    function getSaudeBadge(saude) {
      if (saude >= 70) return 'badge-verde';
      if (saude >= 50) return 'badge-amarelo';
      return 'badge-vermelho';
    }

      function getRecClass(rec) {
    const r = rec.toLowerCase();
    if (r.includes('ideal') || r.includes('condições')) return '';
    if (r.includes('irrigar') || r.includes('reduzir irrigação')) return 'aviso';
    if (r.includes('secando') || r.includes('encharcando') || 
        r.includes('aquecimento') || r.includes('resfriamento')) return 'tendencia';
    if (r.includes('estresse') || r.includes('prejudicar') || 
        r.includes('sofrer') || r.includes('alerta')) return 'alerta';
    return 'aviso';
  }

  const recsHtml = recomendacoes.map(r => {
    const classe = getRecClass(r);
    const icone = classe === '' ? '✓' 
                : classe === 'aviso' ? '⚠️' 
                : classe === 'tendencia' ? '📈' 
                : '🚨';
    return `<div class="rec-item ${classe}"><span>${icone}</span> ${r}</div>`;
  }).join('');

    function formatData(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return isNaN(d.getTime()) ? '—' : d.toLocaleString('pt-BR', { 
        day: '2-digit', month: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    async function carregarDados() {
      try {
        const [ultimoRes, historicoRes] = await Promise.all([
          fetch(`${API_URL}/ultimo-dado`),
          fetch(`${API_URL}/historico`)
        ]);

        if (!ultimoRes.ok || !historicoRes.ok) throw new Error();

        const ultimo = await ultimoRes.json();
        const historico = await historicoRes.json();

        renderizar(ultimo, historico);

        document.getElementById('ultima-atualizacao').textContent = 
          'Online • ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

      } catch (e) {
        document.getElementById('conteudo').innerHTML = 
          '<div class="empty">⚠️ <b>Falha na conexão com o servidor</b><br>Verifique os logs da API hospedada no Railway.</div>';
      }
    }

    function renderizar(ultimo, historico) {
      const dadoAtual = ultimo || {};
      const listaHistorico = Array.isArray(historico) ? historico : [];
      const saudeColor = getSaudeColor(dadoAtual.saude || 0);
      
      const recomendacoes = dadoAtual.recomendacoes || ['Aguardando telemetria inicial...'];
      const recsHtml = recomendacoes.map(r => 
        `<div class="rec-item ${getRecClass(r)}">
          <span>${r.toLowerCase().includes('ideal') ? '✓' : '⚡'}</span> ${r}
        </div>`
      ).join('');

      const historicoHtml = listaHistorico.length === 0 
        ? '<tr><td colspan="5" style="text-align:center;color:var(--texto2);padding:32px">Nenhum registro armazenado no banco de dados.</td></tr>'
        : [...listaHistorico].reverse().slice(0, 10).map(h => `
          <tr>
            <td style="font-weight: 500;">${h.planta || '—'}</td>
            <td style="font-family: 'Space Mono', monospace;">${h.umidade !== undefined ? h.umidade : '—'}%</td>
            <td style="font-family: 'Space Mono', monospace;">${h.temperatura !== undefined ? h.temperatura : '—'}°C</td>
            <td><span class="badge ${getSaudeBadge(h.saude || 0)}">${h.saude !== undefined ? h.saude : '—'}</span></td>
            <td style="color:var(--texto2); font-family: 'Space Mono', monospace;">${formatData(h.data)}</td>
          </tr>
        `).join('');

      document.getElementById('conteudo').innerHTML = `
        <div class="cards-grid">
          <div class="card card-planta" style="animation-delay:0s">
            <div class="card-label">🪴 Espécie Monitorada</div>
            <div class="card-value">${dadoAtual.planta || '—'}</div>
            <div class="card-sub">Leitura ativa</div>
          </div>

          <div class="card" style="animation-delay:0.05s">
            <div class="card-label">💧 Umidade do Solo</div>
            <div class="card-value" style="color:#38bdf8">
              ${dadoAtual.umidade !== undefined ? dadoAtual.umidade : '—'}<span class="card-unit">%</span>
            </div>
            <div class="saude-bar">
              <div class="saude-fill" style="width:${dadoAtual.umidade || 0}%;background:#38bdf8"></div>
            </div>
          </div>

          <div class="card" style="animation-delay:0.1s">
            <div class="card-label">🌡️ Temperatura Ambiente</div>
            <div class="card-value" style="color:#fb923c">
              ${dadoAtual.temperatura !== undefined ? dadoAtual.temperatura : '—'}<span class="card-unit">°C</span>
            </div>
            <div class="card-sub">Sensor térmico</div>
          </div>

          <div class="card" style="animation-delay:0.15s">
            <div class="card-label">💚 Índice de Saúde</div>
            <div class="card-value" style="color:${saudeColor}">
              ${dadoAtual.saude !== undefined ? dadoAtual.saude : '—'}<span class="card-unit">/100</span>
            </div>
            <div class="saude-bar">
              <div class="saude-fill" style="width:${dadoAtual.saude || 0}%;background:${saudeColor}"></div>
            </div>
          </div>
        </div>

        <section class="recomendacoes-card">
          <div class="recomendacoes-title">Análise Operacional e Recomendações</div>
          <div class="rec-list">${recsHtml}</div>
        </section>

        <section class="historico-card">
          <div class="historico-title">
            <span>Histórico de Leituras Recentes</span>
            <span class="update-time">Últimos 10 registros</span>
          </div>
          <div style="overflow-x:auto">
            <table class="historico-table">
              <thead>
                <tr>
                  <th>Planta</th>
                  <th>Umidade</th>
                  <th>Temp.</th>
                  <th>Saúde</th>
                  <th>Data/Hora</th>
                </tr>
              </thead>
              <tbody>${historicoHtml}</tbody>
            </table>
          </div>
        </section>
      `;
    }

    carregarDados();
    setInterval(carregarDados, 10000);
  </script>
</body>
</html>
